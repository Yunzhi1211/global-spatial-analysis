<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍🐕 Global Green Space, Health & Pet Gardens - Integrated Dashboard</title>
    
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <!-- Leaflet Heatmap -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-heat/0.2.0/leaflet-heat.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }
        
        .sidebar {
            width: 320px;
            background: #16213e;
            overflow-y: auto;
            border-right: 1px solid #0f3460;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }
        
        .sidebar h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .filter-group {
            margin-bottom: 18px;
        }
        
        .filter-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 8px;
            background: #0f3460;
            border: 1px solid #00d4ff;
            color: #eee;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .layer-toggle {
            background: #0f3460;
            border: 1px solid #00d4ff;
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .layer-toggle:hover {
            background: #1a2a4e;
        }
        
        .layer-toggle.active {
            background: #00d4ff;
            color: #16213e;
            font-weight: bold;
        }
        
        .stats-box {
            background: #0f3460;
            padding: 10px;
            border-left: 3px solid #00d4ff;
            margin: 8px 0;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .stats-box .label {
            color: #aaa;
        }
        
        .stats-box .value {
            color: #00ff88;
            font-weight: bold;
            font-size: 14px;
        }
        
        #map {
            flex: 1;
            position: relative;
        }
        
        .map-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 10px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 10;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .map-controls button {
            padding: 6px 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }
        
        .map-controls button:hover {
            background: #764ba2;
        }
        
        .map-controls button.active {
            background: #f5576c;
        }
        
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 10;
            font-size: 11px;
        }
        
        .legend-title {
            font-weight: 700;
            margin-bottom: 8px;
            color: #333;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }
        
        .legend-color {
            width: 14px;
            height: 14px;
            margin-right: 6px;
            border-radius: 2px;
        }
        
        .legend-symbol {
            width: 12px;
            height: 12px;
            margin-right: 6px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2>🎯 Controls & Filters</h2>
            
            <!-- Data Layer Selection -->
            <div class="filter-group">
                <label>📊 Data Layer</label>
                <button class="layer-toggle active" onclick="switchLayer('countries')">🌍 Countries</button>
                <button class="layer-toggle" onclick="switchLayer('pets')">🐕 Pet Gardens</button>
                <button class="layer-toggle" onclick="switchLayer('combined')">🔗 Combined View</button>
            </div>
            
            <!-- Visualization Mode -->
            <div class="filter-group">
                <label>🎨 Visualization</label>
                <select id="vizMode" onchange="changeVisualization()">
                    <option value="markers">Markers</option>
                    <option value="heatmap">Heatmap</option>
                    <option value="clusters">Clusters</option>
                </select>
            </div>
            
            <!-- Region Filter -->
            <div class="filter-group">
                <label>🌐 Region</label>
                <select id="regionFilter" onchange="applyFilters()">
                    <option value="">All Regions</option>
                </select>
            </div>
            
            <!-- Country Filter (for pet gardens) -->
            <div class="filter-group" id="countryFilterDiv" style="display:none;">
                <label>🏙️ Country</label>
                <select id="countryFilter" onchange="applyFilters()">
                    <option value="">All Countries</option>
                </select>
            </div>
            
            <!-- Development Level -->
            <div class="filter-group" id="devLevelDiv">
                <label>💰 Development Level</label>
                <select id="devLevel" onchange="applyFilters()">
                    <option value="">All Levels</option>
                    <option value="High Income">High Income</option>
                    <option value="Upper-Middle Income">Upper-Middle</option>
                    <option value="Lower-Middle Income">Lower-Middle</option>
                    <option value="Low Income">Low Income</option>
                </select>
            </div>
            
            <!-- Score Range -->
            <div class="filter-group" id="scoreDiv">
                <label>📈 Score Range: <span id="scoreValue">0</span>+</label>
                <input type="range" id="scoreSlider" min="0" max="100" value="0" 
                       oninput="document.getElementById('scoreValue').textContent = this.value; applyFilters();">
            </div>
            
            <!-- Global Stats -->
            <h2 style="margin-top: 20px; margin-bottom: 10px;">📊 Global Stats</h2>
            <div class="stats-box">
                <div class="label">Total Items</div>
                <div class="value" id="totalCount">-</div>
            </div>
            <div class="stats-box">
                <div class="label">Average Score</div>
                <div class="value" id="avgScore">-</div>
            </div>
            <div class="stats-box">
                <div class="label">Highest</div>
                <div class="value" id="maxScore">-</div>
            </div>
            <div class="stats-box">
                <div class="label">Lowest</div>
                <div class="value" id="minScore">-</div>
            </div>
        </div>
        
        <!-- MAP -->
        <div id="map"></div>
        
        <!-- MAP CONTROLS -->
        <div class="map-controls">
            <button onclick="map.zoomIn()">🔍+</button>
            <button onclick="map.zoomOut()">🔍-</button>
            <button onclick="resetMap()">Reset</button>
            <button onclick="exportData()">📥 Export</button>
        </div>
        
        <!-- LEGEND -->
        <div class="legend">
            <div class="legend-title">Score Ranges</div>
            <div class="legend-item">
                <div class="legend-color" style="background: #31a354;"></div>
                <span>Excellent (75+)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #addd8e;"></div>
                <span>Good (60-74)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ffffcc;"></div>
                <span>Fair (45-59)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ffeda0;"></div>
                <span>Poor (30-44)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ff6b6b;"></div>
                <span>Critical (&lt;30)</span>
            </div>
            <div style="margin-top: 8px; border-top: 1px solid #ddd; padding-top: 8px;">
                <div class="legend-title">Pet Gardens</div>
                <div class="legend-item">
                    <div class="legend-symbol" style="background: #FFD700;"></div>
                    <span>Excellent</span>
                </div>
                <div class="legend-item">
                    <div class="legend-symbol" style="background: #FF8C00;"></div>
                    <span>Good</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // Global Variables
        // ============================================================================
        
        let map;
        let currentLayer = 'countries';
        let currentVizMode = 'markers';
        let worldData = null;
        let petGardensData = null;
        let filteredData = [];
        let markers = [];
        let heatmapLayer = null;
        
        // ============================================================================
        // Initialize Map
        // ============================================================================
        
        function initMap() {
            map = L.map('map').setView([20, 0], 2);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
            
            loadData();
        }
        
        // ============================================================================
        // Load Data
        // ============================================================================
        
        function loadData() {
            console.log('Loading data...');
            
            // Try combined first, fall back to individual files
            fetch('data/world_data_with_pets.geojson')
                .then(r => r.json())
                .then(data => {
                    worldData = data;
                    console.log('✅ World data loaded:', data.features.length);
                    initializeFilters();
                    applyFilters();
                })
                .catch(e => {
                    console.warn('Combined file not found, loading individual files...');
                    loadIndividualData();
                });
        }
        
        function loadIndividualData() {
            Promise.all([
                fetch('data/world_data_enhanced.geojson').then(r => r.json()),
                fetch('data/pet_gardens_global.geojson').then(r => r.json())
            ])
            .then(([world, pets]) => {
                worldData = world;
                petGardensData = pets;
                console.log('✅ Individual data loaded');
                initializeFilters();
                applyFilters();
            })
            .catch(e => console.error('Error loading data:', e));
        }
        
        // ============================================================================
        // Switch Layer
        // ============================================================================
        
        function switchLayer(layer) {
            currentLayer = layer;
            document.querySelectorAll('.layer-toggle').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update filter visibility
            document.getElementById('devLevelDiv').style.display = 
                (layer === 'countries' || layer === 'combined') ? 'block' : 'none';
            document.getElementById('countryFilterDiv').style.display = 
                (layer === 'pets' || layer === 'combined') ? 'block' : 'none';
            document.getElementById('scoreDiv').style.display = 
                (layer === 'countries' || layer === 'combined') ? 'block' : 'none';
            
            applyFilters();
        }
        
        // ============================================================================
        // Initialize Filters
        // ============================================================================
        
        function initializeFilters() {
            if (!worldData) return;
            
            // Regions
            const regions = [...new Set(worldData.features.map(f => f.properties.region))].sort();
            const regionSelect = document.getElementById('regionFilter');
            regions.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r;
                opt.textContent = r;
                regionSelect.appendChild(opt);
            });
            
            // Countries (for pet gardens)
            if (petGardensData) {
                const countries = [...new Set(petGardensData.features.map(f => f.properties.country))].sort();
                const countrySelect = document.getElementById('countryFilter');
                countries.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = c;
                    countrySelect.appendChild(opt);
                });
            }
        }
        
        // ============================================================================
        // Apply Filters
        // ============================================================================
        
        function applyFilters() {
            filteredData = [];
            
            if (currentLayer === 'countries' || currentLayer === 'combined') {
                filteredData = filterCountries();
            } else if (currentLayer === 'pets') {
                filteredData = filterPetGardens();
            }
            
            updateStatistics();
            visualizeData();
        }
        
        function filterCountries() {
            if (!worldData) return [];
            
            const region = document.getElementById('regionFilter').value;
            const devLevel = document.getElementById('devLevel').value;
            const scoreMin = parseInt(document.getElementById('scoreSlider').value);
            
            return worldData.features.filter(f => {
                const props = f.properties;
                if (region && props.region !== region) return false;
                if (devLevel && props.development_level !== devLevel) return false;
                if (props.overall_score < scoreMin) return false;
                return true;
            });
        }
        
        function filterPetGardens() {
            if (!petGardensData) return [];
            
            const country = document.getElementById('countryFilter').value;
            
            return petGardensData.features.filter(f => {
                if (country && f.properties.country !== country) return false;
                return true;
            });
        }
        
        // ============================================================================
        // Update Statistics
        // ============================================================================
        
        function updateStatistics() {
            if (!filteredData || filteredData.length === 0) {
                document.getElementById('totalCount').textContent = '0';
                document.getElementById('avgScore').textContent = '-';
                document.getElementById('maxScore').textContent = '-';
                document.getElementById('minScore').textContent = '-';
                return;
            }
            
            let scoreKey = 'overall_score';
            if (currentLayer === 'pets') scoreKey = 'quality_score';
            
            const scores = filteredData
                .map(f => f.properties[scoreKey])
                .filter(s => !isNaN(s));
            
            document.getElementById('totalCount').textContent = filteredData.length;
            document.getElementById('avgScore').textContent = (scores.reduce((a,b)=>a+b)/scores.length).toFixed(1);
            document.getElementById('maxScore').textContent = Math.max(...scores).toFixed(1);
            document.getElementById('minScore').textContent = Math.min(...scores).toFixed(1);
        }
        
        // ============================================================================
        // Visualization
        // ============================================================================
        
        function changeVisualization() {
            currentVizMode = document.getElementById('vizMode').value;
            visualizeData();
        }
        
        function visualizeData() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            if (heatmapLayer) map.removeLayer(heatmapLayer);
            
            if (currentVizMode === 'markers') {
                visualizeMarkers();
            } else if (currentVizMode === 'heatmap') {
                visualizeHeatmap();
            }
        }
        
        function visualizeMarkers() {
            filteredData.forEach(f => {
                const [lng, lat] = f.geometry.coordinates;
                const props = f.properties;
                let score, color, label;
                
                if (currentLayer === 'pets') {
                    score = props.quality_score;
                    label = props.name;
                    color = score >= 85 ? '#FFD700' : score >= 75 ? '#FF8C00' : '#FF6347';
                } else {
                    score = props.overall_score;
                    label = props.country;
                    color = getColor(score);
                }
                
                const circle = L.circleMarker([lat, lng], {
                    radius: Math.sqrt(Math.max(score, 1)) / 2.5,
                    fillColor: color,
                    color: '#fff',
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.7
                }).addTo(map);
                
                circle.bindPopup(`<strong>${label}</strong><br>Score: ${score.toFixed(1)}/100`);
                markers.push(circle);
            });
        }
        
        function visualizeHeatmap() {
            const heatData = filteredData.map(f => {
                const [lng, lat] = f.geometry.coordinates;
                const score = (currentLayer === 'pets') ? 
                    f.properties.quality_score : f.properties.overall_score;
                return [lat, lng, score / 100];
            });
            
            heatmapLayer = L.heatLayer(heatData, {
                radius: 30,
                blur: 20,
                max: 1,
                minOpacity: 0.2,
                gradient: {0.0: '#ff6b6b', 0.3: '#ffeda0', 0.5: '#ffffcc', 0.7: '#addd8e', 1.0: '#31a354'}
            }).addTo(map);
        }
        
        function getColor(score) {
            if (score >= 75) return '#31a354';
            if (score >= 60) return '#addd8e';
            if (score >= 45) return '#ffffcc';
            if (score >= 30) return '#ffeda0';
            return '#ff6b6b';
        }
        
        // ============================================================================
        // Utilities
        // ============================================================================
        
        function resetMap() {
            map.setView([20, 0], 2);
            document.getElementById('regionFilter').value = '';
            document.getElementById('countryFilter').value = '';
            document.getElementById('devLevel').value = '';
            document.getElementById('scoreSlider').value = '0';
            applyFilters();
        }
        
        function exportData() {
            const csv = filteredData.map(f => {
                const p = f.properties;
                const [lng, lat] = f.geometry.coordinates;
                if (currentLayer === 'pets') {
                    return `${p.name},${p.country},${p.city},${lat},${lng},${p.quality_score}`;
                } else {
                    return `${p.country},${p.region},${lat},${lng},${p.overall_score}`;
                }
            }).join('\n');
            
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `export_${currentLayer}_${new Date().getTime()}.csv`;
            a.click();
        }
        
        // ============================================================================
        // Initialize
        // ============================================================================
        
        window.addEventListener('load', initMap);
    </script>
</body>
</html>
